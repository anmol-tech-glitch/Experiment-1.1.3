<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dashboard">
    
    <header class="header">
      <h2>Admin Dashboard</h2>
      <button id="themeToggle">Toggle Theme</button>
    </header>

    <aside class="sidebar">
      <ul>
        <li>Home</li>
        <li>Users</li>
        <li>Settings</li>
      </ul>
    </aside>

    <main class="content">
      <div class="card">Users: 120</div>
      <div class="card">Sales: ₹50K</div>
      <div class="card">Visits: 1.2K</div>
    </main>

    <footer class="footer">
      <p>© 2026 Admin Panel</p>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
